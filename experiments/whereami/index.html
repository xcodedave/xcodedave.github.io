<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }

<pre id="display"></pre>

<!-- Audio manager: Web Audio API wrapper with Mobile Safari / iPhone support -->
<script>
(function() {
  var ctx = null;
  var silentAudio = null;
  var buffers = {};
  var active = {};
  var pending = []; // {id, url} queued before AudioContext exists

  // iOS 17+ / Safari 16.4+: ignore mute switch
  if ('audioSession' in navigator) {
    navigator.audioSession.type = 'playback';
  }

  // Silent MP3 data URL — forces WebAudio onto the media channel on iOS,
  // bypassing the mute switch on older devices
  var SILENCE_MP3 = 'data:audio/mpeg;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAACAAACcQCAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICA//////////////////////////////////////////////////////////////////8AAABhTEFNRTMuMTAwA8MAAAAAAAAAABQgJAUHQQAB9AAAAnGMHkkIAAAAAAAAAAAAAAAAAAAAAAAA//sQxAADgnABGiAAQBCqgCRMAAgEAH///////////////7+n/9FTuQsQH//////2NG0jWUGlio5gLQTOtIoeR2WX////X4s9Atb/JRVCbBUpeRUq//////////////////9RUi0f2jn/+xDECgPCjAEQAABN4AAANIAAAAQVTEFNRTMuMTAw';

  function createCtx() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Auto-resume if context gets interrupted (e.g. phone call, tab switch)
    ctx.onstatechange = function() {
      if (ctx.state === 'interrupted' || ctx.state === 'suspended') {
        ctx.resume().catch(function(){});
      }
    };
  }

  // Unlock audio on iOS — must be called from a user gesture
  function unlockAudio() {
    createCtx();

    // Resume suspended context
    if (ctx.state === 'suspended' || ctx.state === 'interrupted') {
      ctx.resume().catch(function(){});
    }

    // Play a silent WebAudio buffer to warm up the hardware
    try {
      var b = ctx.createBuffer(1, 1, 22050);
      var s = ctx.createBufferSource();
      s.buffer = b;
      s.connect(ctx.destination);
      s.start(0);
    } catch(e) {}

    // Play looping silent HTML5 Audio to claim the media audio channel
    if (!silentAudio) {
      silentAudio = document.createElement('audio');
      silentAudio.setAttribute('x-webkit-airplay', 'deny');
      silentAudio.preload = 'auto';
      silentAudio.loop = true;
      silentAudio.src = SILENCE_MP3;
      silentAudio.load();
    }
    silentAudio.play().catch(function(){});

    // Process any sounds queued before context was ready
    for (var i = 0; i < pending.length; i++) {
      doLoad(pending[i].id, pending[i].url);
    }
    pending.length = 0;
  }

  // Trigger unlock on all gesture types (touch for mobile, key/click for desktop)
  ['touchstart','touchend','mousedown','click','keydown'].forEach(function(e) {
    document.addEventListener(e, unlockAudio, {passive: true, capture: true});
  });

  // Re-activate audio when returning from background / tab switch
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible' && silentAudio) {
      silentAudio.play().catch(function(){});
      if (ctx && ctx.state !== 'running') {
        ctx.resume().catch(function(){});
      }
    }
  });

  async function doLoad(id, url) {
    try {
      var resp = await fetch(url);
      var data = await resp.arrayBuffer();
      buffers[id] = await ctx.decodeAudioData(data);
      console.log('audio loaded: ' + id);
    } catch (e) {
      console.warn('audio load failed: ' + id, e);
    }
  }

  // --- Global functions called from WASM ---

  window.audioLoad = function(id, url) {
    if (ctx) { doLoad(id, url); }
    else { pending.push({ id: id, url: url }); }
  };

  window.audioPlay = function(id, loops, volume, fadeIn, pitch) {
    if (!ctx) return;
    // Resume if needed (may happen after background/interrupt)
    if (ctx.state !== 'running') {
      ctx.resume().catch(function(){});
    }
    // If buffer isn't loaded yet, retry every 200ms until it is
    if (!buffers[id]) {
      var retry = setInterval(function() {
        if (buffers[id]) {
          clearInterval(retry);
          window.audioPlay(id, loops, volume, fadeIn, pitch);
        }
      }, 200);
      return;
    }

    // Stop existing instance of this sound
    if (active[id]) {
      try { active[id].source.stop(); } catch (_) {}
    }

    var source = ctx.createBufferSource();
    source.buffer = buffers[id];
    source.loop = (loops === -1);
    source.playbackRate.value = pitch;

    var gain = ctx.createGain();
    if (fadeIn > 0) {
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(volume, ctx.currentTime + fadeIn);
    } else {
      gain.gain.value = volume;
    }

    source.connect(gain);
    gain.connect(ctx.destination);
    source.start(0);

    source.onended = function() { if (active[id] && active[id].source === source) delete active[id]; };
    active[id] = { source: source, gain: gain, volume: volume };
  };

  window.audioStop = function(id, fadeOut) {
    var s = active[id];
    if (!s) return;
    if (fadeOut > 0 && ctx) {
      s.gain.gain.setValueAtTime(s.gain.gain.value, ctx.currentTime);
      s.gain.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + fadeOut);
      setTimeout(function() {
        try { s.source.stop(); } catch (_) {}
        delete active[id];
      }, fadeOut * 1000 + 50);
    } else {
      try { s.source.stop(); } catch (_) {}
      delete active[id];
    }
  };

  window.audioSetVolume = function(id, volume, fadeSecs) {
    var s = active[id];
    if (!s || !ctx) return;
    if (fadeSecs > 0) {
      s.gain.gain.setValueAtTime(s.gain.gain.value, ctx.currentTime);
      s.gain.gain.linearRampToValueAtTime(volume, ctx.currentTime + fadeSecs);
    } else {
      s.gain.gain.value = volume;
    }
    s.volume = volume;
  };

  window.audioSetPitch = function(id, pitch) {
    var s = active[id];
    if (s) s.source.playbackRate.value = pitch;
  };
})();
</script>

<script type="module">
import init, { Engine, build_id } from './pkg/ascii3d.js';

async function run() {
  await init();
  console.log('build:', build_id());

  const display = document.getElementById('display');

  // Scale font for mobile/retina: use larger text on touch devices
  const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  const fontSize = isMobile ? '10px' : '11px';
  display.style.fontSize = fontSize;

  // Measure character cell size using a probe
  const probe = document.createElement('span');
  probe.style.cssText = display.style.cssText || '';
  probe.style.fontFamily = '"Courier New", Courier, monospace';
  probe.style.fontSize = fontSize;
  probe.style.lineHeight = '1.0';
  probe.style.letterSpacing = '0px';
  probe.style.whiteSpace = 'pre';
  probe.style.position = 'absolute';
  probe.style.visibility = 'hidden';
  probe.textContent = 'X';
  document.body.appendChild(probe);
  const charW = probe.getBoundingClientRect().width;
  const charH = probe.getBoundingClientRect().height;
  document.body.removeChild(probe);

  let cols = Math.floor(window.innerWidth / charW);
  let rows = Math.floor(window.innerHeight / charH);
  console.log(`grid: ${cols}x${rows} (char: ${charW}x${charH})`);

  const engine = new Engine(cols, rows);

  // Restore state from URL hash if present
  if (window.location.hash.length > 1) {
    try {
      const state = atob(window.location.hash.substring(1));
      engine.set_state(state);
      console.log('restored state:', state);
    } catch (e) {
      console.warn('invalid state in URL');
    }
  }

  // Update URL when the character stops moving
  let wasMoving = false;

  window.addEventListener('resize', () => {
    const newCols = Math.floor(window.innerWidth / charW);
    const newRows = Math.floor(window.innerHeight / charH);
    if (newCols !== cols || newRows !== rows) {
      cols = newCols;
      rows = newRows;
      engine.resize(cols, rows);
      console.log(`resized: ${cols}x${rows}`);
    }
  });

  document.addEventListener('keydown', e => {
    engine.key_down(e.key);
    e.preventDefault();
  });

  document.addEventListener('keyup', e => {
    engine.key_up(e.key);
  });

  // --- Mouse drag to orbit camera ---
  let mouseDragging = false;
  let mouseLastX = 0;
  const MOUSE_CAM_SPEED = 0.005;

  document.addEventListener('mousedown', e => {
    mouseDragging = true;
    mouseLastX = e.clientX;
  });

  document.addEventListener('mousemove', e => {
    if (!mouseDragging) return;
    const dx = e.clientX - mouseLastX;
    engine.touch_camera(dx * MOUSE_CAM_SPEED);
    mouseLastX = e.clientX;
  });

  document.addEventListener('mouseup', () => { mouseDragging = false; });
  document.addEventListener('mouseleave', () => { mouseDragging = false; });

  // --- Touch controls (invisible, no HUD) ---
  // Bottom half: horizontal drag orbits camera, vertical drag distance = run speed
  // Top half: pure camera orbit
  let moveTouch = null;  // {id, ox, oy}
  let camTouch = null;   // {id, ox, oy}
  const DEAD_ZONE = 10;
  const MAX_RADIUS = 80;
  const CAM_SPEED = 0.012;      // radians per pixel (top half - pure camera)
  const MOVE_CAM_SPEED = 0.005; // radians per pixel (bottom half - blended camera)

  document.addEventListener('touchstart', e => {
    for (let i = 0; i < e.changedTouches.length; i++) {
      const t = e.changedTouches[i];
      const isBottom = t.clientY > window.innerHeight * 0.5;
      if (isBottom && !moveTouch) {
        moveTouch = { id: t.identifier, ox: t.clientX, oy: t.clientY, lastX: t.clientX };
      } else if (!isBottom && !camTouch) {
        camTouch = { id: t.identifier, ox: t.clientX, oy: t.clientY };
      }
    }
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    for (let i = 0; i < e.changedTouches.length; i++) {
      const t = e.changedTouches[i];

      // Bottom half: camera orbit + movement with subtle strafing
      if (moveTouch && t.identifier === moveTouch.id) {
        // Horizontal delta orbits camera
        const hdx = t.clientX - moveTouch.lastX;
        engine.touch_camera(-hdx * MOVE_CAM_SPEED);
        moveTouch.lastX = t.clientX;

        // Full drag vector from origin
        const dx = t.clientX - moveTouch.ox;
        const dy = moveTouch.oy - t.clientY; // positive = up = forward
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < DEAD_ZONE) {
          engine.touch_input(0, 0);
        } else {
          const mag = Math.min((dist - DEAD_ZONE) / (MAX_RADIUS - DEAD_ZONE), 1.0);
          // Normalize the drag direction
          const ndx = dx / dist;
          const ndy = dy / dist;
          // Blend: 75% pure forward (sign of vertical), 25% actual drag angle
          const forwardDir = ndy >= 0 ? 1.0 : -1.0;
          const strafeX = ndx * 0.4;
          const forwardZ = forwardDir * 0.6 + ndy * 0.4;
          engine.touch_input(-strafeX * mag, forwardZ * mag);
        }
      }

      // Top half: pure camera orbit
      if (camTouch && t.identifier === camTouch.id) {
        const dx = t.clientX - camTouch.ox;
        engine.touch_camera(dx * CAM_SPEED);
        camTouch.ox = t.clientX;
        camTouch.oy = t.clientY;
      }
    }
    e.preventDefault();
  }, { passive: false });

  function touchEnd(e) {
    for (let i = 0; i < e.changedTouches.length; i++) {
      const id = e.changedTouches[i].identifier;
      if (moveTouch && id === moveTouch.id) {
        moveTouch = null;
        engine.touch_input(0, 0);
      }
      if (camTouch && id === camTouch.id) {
        camTouch = null;
      }
    }
  }
  document.addEventListener('touchend', touchEnd);
  document.addEventListener('touchcancel', touchEnd);

  let lastTime = performance.now();
  let capped = false;
  const MIN_FRAME_MS = 1000 / 12; // 12 fps cap

  document.addEventListener('keydown', e => {
    if (e.key === 'f' || e.key === 'F') {
      capped = !capped;
    }
  });

  function frame(now) {
    if (capped && (now - lastTime) < MIN_FRAME_MS) {
      requestAnimationFrame(frame);
      return;
    }

    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    const text = engine.update(dt);
    display.textContent = text;

    // Update URL hash when the character stops moving
    const moving = engine.is_moving();
    if (wasMoving && !moving) {
      const state = engine.get_state();
      history.replaceState(null, '', '#' + btoa(state));
    }
    wasMoving = moving;

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
}

run();

// Poll the WASM binary for changes and auto-reload
(async function watchForChanges() {
  let lastModified = null;
  while (true) {
    await new Promise(r => setTimeout(r, 1500));
    try {
      const res = await fetch('./pkg/ascii3d_bg.wasm', { method: 'HEAD', cache: 'no-store' });
      const mod = res.headers.get('last-modified');
      if (lastModified === null) {
        lastModified = mod;
      } else if (mod !== lastModified) {
        console.log('WASM changed, reloading...');
        location.reload();
      }
    } catch {}
  }
})();
</script>
