<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SwiftVoxel — WebGPU Voxel Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #1a1a24;
            --panel: #2a2a38;
            --btn-face: #3a3a4e;
            --highlight: #5a5a7a;
            --dark-shadow: #0d0d14;
            --text: #ccccdd;
            --text-dim: #7777aa;
            --accent: #6688cc;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #viewport {
            flex: 1;
            position: relative;
            min-width: 0;
        }

        #viewport canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
            cursor: crosshair;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #sidebar {
            width: 220px;
            background: var(--panel);
            border-left: 2px solid var(--highlight);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .section {
            padding: 8px;
            border-bottom: 1px solid var(--dark-shadow);
        }

        .section-header {
            color: var(--text-dim);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: bold;
        }

        /* Beveled panel */
        .bevel {
            box-shadow:
                inset 1px 1px 0 var(--highlight),
                inset -1px -1px 0 var(--dark-shadow);
        }

        .bevel-sunken {
            box-shadow:
                inset 1px 1px 0 var(--dark-shadow),
                inset -1px -1px 0 var(--highlight);
        }

        /* Buttons */
        .btn {
            background: var(--btn-face);
            color: var(--text);
            border: none;
            padding: 5px 10px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow:
                inset 1px 1px 0 var(--highlight),
                inset -1px -1px 0 var(--dark-shadow);
        }

        .btn:hover {
            background: var(--highlight);
        }

        .btn.active {
            background: var(--accent);
            color: #fff;
            box-shadow:
                inset 1px 1px 0 var(--dark-shadow),
                inset -1px -1px 0 var(--highlight);
        }

        /* Selected section */
        #selected-section {
            display: flex;
            gap: 8px;
        }

        .selected-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        #color-swatch {
            width: 100%;
            aspect-ratio: 1;
            border: none;
        }

        #tile-preview-canvas {
            width: 100%;
            aspect-ratio: 1;
            background: var(--dark-shadow);
            image-rendering: pixelated;
        }

        .selected-label {
            color: var(--text-dim);
            font-size: 10px;
            letter-spacing: 1px;
        }

        .tool-buttons {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }

        .tool-buttons .btn {
            flex: 1;
        }

        /* Palette grid */
        #palette-grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 1px;
            padding: 2px;
            background: var(--dark-shadow);
        }

        .palette-cell {
            aspect-ratio: 1;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .palette-cell:hover {
            border-color: #fff;
        }

        .palette-cell.selected {
            border: 2px solid #fff;
        }

        /* Tile grid */
        #tile-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
        }

        .tile-cell {
            aspect-ratio: 1;
            background: var(--dark-shadow);
            cursor: pointer;
            border: 2px solid transparent;
            overflow: hidden;
        }

        .tile-cell:hover {
            border-color: var(--highlight);
        }

        .tile-cell.selected {
            border-color: var(--accent);
        }

        .tile-cell canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        /* File buttons */
        .file-buttons {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .file-buttons .btn {
            flex: 1;
            min-width: 60px;
            font-size: 10px;
        }

        /* Loading overlay */
        #status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #aaa;
            font-family: monospace;
            font-size: 16px;
            text-align: center;
            z-index: 100;
        }

        /* Toggle button */
        .toggle-btn {
            width: 100%;
        }

        .toggle-btn.on {
            background: var(--accent);
            color: #fff;
        }

        /* Responsive: stack sidebar below viewport on small screens */
        @media (max-width: 680px) {
            body { flex-direction: column; }
            #sidebar {
                flex: 0 0 auto;
                width: 100%;
                max-height: 44vh;
                flex-direction: row;
                flex-wrap: wrap;
                border-left: none;
                border-top: 2px solid var(--highlight);
                overflow-x: auto;
            }
            .section { flex: 0 0 auto; min-width: 110px; }
            #palette-grid { grid-template-columns: repeat(32, 1fr); max-height: none; }
        }
    </style>
</head>
<body>
    <div id="viewport">
        <canvas id="canvas"></canvas>
    </div>
    <div id="sidebar">
        <!-- SELECTED -->
        <div class="section">
            <div class="section-header">Selected</div>
            <div id="selected-section">
                <div class="selected-column">
                    <div id="color-swatch" class="bevel-sunken"></div>
                    <span class="selected-label" id="color-label">C: 1</span>
                </div>
                <div class="selected-column">
                    <canvas id="tile-preview-canvas" width="64" height="64"></canvas>
                    <span class="selected-label" id="tile-label">T: 0</span>
                </div>
            </div>
            <div class="tool-buttons">
                <button class="btn active" id="btn-voxel" onclick="setTool('voxel')">Voxel</button>
                <button class="btn" id="btn-tile" onclick="setTool('tile')">Tile</button>
            </div>
        </div>

        <!-- RENDER -->
        <div class="section">
            <div class="section-header">Render</div>
            <button class="btn toggle-btn on" id="btn-lighting" onclick="toggleLighting()">Lighting ON</button>
        </div>

        <!-- PALETTE -->
        <div class="section">
            <div class="section-header">Palette</div>
            <div id="palette-grid" class="bevel-sunken"></div>
        </div>

        <!-- TILES -->
        <div class="section">
            <div class="section-header">Tiles</div>
            <div id="tile-grid"></div>
        </div>

        <!-- FILE -->
        <div class="section">
            <div class="section-header">File</div>
            <div class="file-buttons">
                <button class="btn" onclick="saveSvox()">Save</button>
                <button class="btn" onclick="loadSvox()">Load</button>
                <button class="btn" onclick="exportVox()">Export</button>
                <button class="btn" onclick="importVox()">Import</button>
            </div>
        </div>
    </div>

    <div id="status">Loading WebGPU...</div>

    <script type="module">
        // Resolution scale factor for the ray-cast canvas.
        // 1.0 = CSS pixel resolution, 0.5 = half, 0.25 = quarter.
        // Applied by intercepting canvas.width/height setters so winit's
        // writes are transparently scaled.
        let wasm;
        let paletteColors = [];
        let selectedColorIndex = 1;
        let selectedTileIndex = 0;
        let currentTool = 'voxel';
        let lightingEnabled = true;
        let lastTileCount = 0;
        let lastClientX = 0;
        let lastClientY = 0;
        // Tile icon cache: maps tileIndex -> { hash, canvas }
        const tileIconCache = new Map();

        async function init() {
            const status = document.getElementById('status');

            try {
                const CACHE_V = '17';
                const { default: init_wasm, ...exports } = await import('./pkg/swift_voxel_web.js?v=' + CACHE_V);
                await init_wasm('./pkg/swift_voxel_web_bg.wasm?v=' + CACHE_V);
                wasm = exports;
                status.style.display = 'none';

                // Wait for renderer to be ready
                await waitForReady();

                // Build palette grid
                buildPaletteGrid();

                // Start UI update loop
                requestAnimationFrame(uiLoop);

                // Setup canvas events
                setupCanvasEvents();

            } catch (e) {
                status.textContent = 'Failed to initialize: ' + e.message;
                console.error(e);
            }
        }

        function waitForReady() {
            return new Promise(resolve => {
                const check = () => {
                    if (wasm.js_is_ready()) {
                        resolve();
                    } else {
                        setTimeout(check, 50);
                    }
                };
                check();
            });
        }

        // ── Palette ──────────────────────────────────────

        function buildPaletteGrid() {
            const grid = document.getElementById('palette-grid');
            try {
                paletteColors = JSON.parse(wasm.js_get_palette_json());
            } catch { paletteColors = []; }

            grid.innerHTML = '';
            for (let i = 1; i < 256; i++) {
                const cell = document.createElement('div');
                cell.className = 'palette-cell' + (i === selectedColorIndex ? ' selected' : '');
                cell.style.background = paletteColors[i] || '#000';
                cell.dataset.index = i;
                cell.onclick = () => selectColor(i);
                grid.appendChild(cell);
            }
        }

        function selectColor(index) {
            selectedColorIndex = index;
            wasm.js_set_color_index(index);
            // Update selection highlight
            document.querySelectorAll('.palette-cell').forEach(el => {
                el.classList.toggle('selected', parseInt(el.dataset.index) === index);
            });
            updateColorSwatch();
            // Auto-select voxel tool (matches Swift behavior)
            setTool('voxel');
        }

        function updateColorSwatch() {
            const swatch = document.getElementById('color-swatch');
            swatch.style.background = paletteColors[selectedColorIndex] || '#000';
            const colorLabel = document.getElementById('color-label');
            if (colorLabel) colorLabel.textContent = 'C: ' + selectedColorIndex;
            const tileLabel = document.getElementById('tile-label');
            if (tileLabel) tileLabel.textContent = 'T: ' + selectedTileIndex;
            // Update tile preview
            const tpCanvas = document.getElementById('tile-preview-canvas');
            if (tpCanvas) renderTileIcon(tpCanvas, selectedTileIndex);
        }

        // ── Tool selection ───────────────────────────────

        window.setTool = function(tool) {
            currentTool = tool;
            wasm.js_set_tool(tool);
            document.getElementById('btn-voxel').classList.toggle('active', tool === 'voxel');
            document.getElementById('btn-tile').classList.toggle('active', tool === 'tile');
        };

        // ── Lighting toggle ──────────────────────────────

        window.toggleLighting = function() {
            lightingEnabled = !lightingEnabled;
            wasm.js_toggle_lighting();
            const btn = document.getElementById('btn-lighting');
            btn.textContent = lightingEnabled ? 'Lighting ON' : 'Lighting OFF';
            btn.classList.toggle('on', lightingEnabled);
        };

        // ── File I/O ─────────────────────────────────────

        window.saveSvox = function() {
            const data = wasm.js_save_svox();
            const blob = new Blob([data], { type: 'application/octet-stream' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'scene.svox';
            a.click();
            URL.revokeObjectURL(a.href);
        };

        window.loadSvox = function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.svox';
            input.onchange = async () => {
                const file = input.files[0];
                if (!file) return;
                const buf = new Uint8Array(await file.arrayBuffer());
                wasm.js_load_svox(buf);
                buildPaletteGrid();
            };
            input.click();
        };

        window.exportVox = function() {
            const data = wasm.js_export_vox();
            const blob = new Blob([data], { type: 'application/octet-stream' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'scene.vox';
            a.click();
            URL.revokeObjectURL(a.href);
        };

        window.importVox = function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.vox';
            input.onchange = async () => {
                const file = input.files[0];
                if (!file) return;
                const buf = new Uint8Array(await file.arrayBuffer());
                wasm.js_import_vox(buf);
                buildPaletteGrid();
            };
            input.click();
        };

        // ── Tile grid ────────────────────────────────────

        function updateTileGrid() {
            if (!wasm || !wasm.js_is_ready()) return;

            let state;
            try {
                state = JSON.parse(wasm.js_get_editor_state_json());
            } catch { return; }

            const tileCount = state.tileCount || 0;
            selectedTileIndex = state.selectedTileIndex;
            lightingEnabled = state.lightingEnabled;

            // Sync tool button UI if state changed externally
            if (state.tool && state.tool !== currentTool) {
                currentTool = state.tool;
                document.getElementById('btn-voxel').classList.toggle('active', currentTool === 'voxel');
                document.getElementById('btn-tile').classList.toggle('active', currentTool === 'tile');
            }

            if (tileCount !== lastTileCount) {
                lastTileCount = tileCount;
                rebuildTileGrid(tileCount);
            }

            // Update selection
            document.querySelectorAll('.tile-cell').forEach(el => {
                el.classList.toggle('selected', parseInt(el.dataset.index) === selectedTileIndex);
            });
        }

        function rebuildTileGrid(count) {
            const grid = document.getElementById('tile-grid');
            grid.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const cell = document.createElement('div');
                cell.className = 'tile-cell' + (i === selectedTileIndex ? ' selected' : '');
                cell.dataset.index = i;
                cell.onclick = () => {
                    wasm.js_select_tile(i);
                    selectedTileIndex = i;
                    document.querySelectorAll('.tile-cell').forEach(el => {
                        el.classList.toggle('selected', parseInt(el.dataset.index) === i);
                    });
                    // Auto-select tile tool (matches Swift behavior)
                    setTool('tile');
                };

                const cvs = document.createElement('canvas');
                cvs.width = 64;
                cvs.height = 64;
                cell.appendChild(cvs);
                grid.appendChild(cell);

                renderTileIcon(cvs, i);
            }
        }

        // Simple hash for tile data (FNV-1a 32-bit)
        function hashTileData(data) {
            let h = 0x811c9dc5;
            for (let i = 0; i < data.length; i++) {
                h ^= data[i];
                h = Math.imul(h, 0x01000193);
            }
            return h >>> 0;
        }

        // Isometric tile icon rendering — matches Swift TileIconCache
        function renderTileIcon(canvas, tileIndex) {
            if (!wasm || !wasm.js_is_ready()) return;
            const data = wasm.js_get_tile_data(tileIndex);
            if (!data || data.length < 512) return;

            // Check cache — skip rendering if tile data hasn't changed
            const hash = hashTileData(data);
            const cached = tileIconCache.get(tileIndex);
            if (cached && cached.hash === hash) {
                // Blit cached image if canvas is different
                if (cached.canvas !== canvas) {
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(cached.canvas, 0, 0);
                }
                return;
            }

            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            ctx.clearRect(0, 0, w, h);

            // Isometric projection constants — doubled from Swift TileIconCache
            // (36px→64px) so each face polygon is 4+ pixels wide and Canvas2D
            // anti-aliasing doesn't darken the tiny polygons.
            const stepX = 3.5;
            const stepY = 1.75;
            const stepH = 3.5;
            const ox = w / 2;
            const oy = h / 2;

            // Project tile-space (x,y,z) to canvas coords (y-down)
            function project(x, y, z) {
                return {
                    x: (x - z) * stepX + ox,
                    y: -(y * stepH - (x + z) * stepY) + oy
                };
            }

            function fillQuad(p0, p1, p2, p3) {
                ctx.beginPath();
                ctx.moveTo(p0.x, p0.y);
                ctx.lineTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.lineTo(p3.x, p3.y);
                ctx.closePath();
                ctx.fill();
            }

            // Back-to-front painter's algorithm: sort by depth (x+z) ascending,
            // then y ascending, matching Swift's rendering order exactly.
            for (let depth = 0; depth <= 14; depth++) {
                for (let x = 0; x <= Math.min(7, depth); x++) {
                    const z = depth - x;
                    if (z < 0 || z > 7) continue;
                    for (let y = 0; y < 8; y++) {
                        const ci = data[x + y * 8 + z * 64];
                        if (ci === 0) continue;

                        const color = paletteColors[ci] || '#888';
                        const r = parseInt(color.slice(1,3), 16);
                        const g = parseInt(color.slice(3,5), 16);
                        const b = parseInt(color.slice(5,7), 16);

                        // Left face (z+ face) — 70% brightness
                        ctx.fillStyle = `rgb(${r*0.7|0},${g*0.7|0},${b*0.7|0})`;
                        fillQuad(
                            project(x, y+1, z+1), project(x+1, y+1, z+1),
                            project(x+1, y, z+1), project(x, y, z+1)
                        );

                        // Right face (x+ face) — 85% brightness
                        ctx.fillStyle = `rgb(${r*0.85|0},${g*0.85|0},${b*0.85|0})`;
                        fillQuad(
                            project(x+1, y+1, z), project(x+1, y+1, z+1),
                            project(x+1, y, z+1), project(x+1, y, z)
                        );

                        // Top face (y+ face) — full brightness (drawn last)
                        ctx.fillStyle = color;
                        fillQuad(
                            project(x, y+1, z), project(x+1, y+1, z),
                            project(x+1, y+1, z+1), project(x, y+1, z+1)
                        );
                    }
                }
            }

            // Store in cache
            tileIconCache.set(tileIndex, { hash, canvas });
        }

        // ── Canvas coordinate helper ─────────────────────

        let canvasRect = null;
        function canvasCoords(clientX, clientY) {
            if (!canvasRect) {
                const c = document.getElementById('canvas');
                canvasRect = c.getBoundingClientRect();
            }
            // Return coordinates normalised to [0, 1] — Rust multiplies by
            // its own width/height so the coordinate space always matches
            // the camera projection regardless of render scale or DPR.
            return {
                x: (clientX - canvasRect.left) / (canvasRect.width || 1),
                y: (clientY - canvasRect.top) / (canvasRect.height || 1),
            };
        }

        // ── DPR-aware resize ─────────────────────────────

        function onResize() {
            canvasRect = null; // invalidate cached getBoundingClientRect
            const vp = document.getElementById('viewport');
            const c = document.getElementById('canvas');
            if (!vp || !c) return;
            // Set canvas to CSS pixel dimensions. Rust's resize() handler
            // applies render_scale to the surface buffer size.
            c.width  = vp.clientWidth;
            c.height = vp.clientHeight;
        }

        // ── Canvas events ────────────────────────────────

        function setupCanvasEvents() {
            const canvas = document.getElementById('canvas');
            if (!canvas) return;

            // Prevent right-click context menu
            canvas.addEventListener('contextmenu', e => e.preventDefault());

            // ── Mouse / single-pointer events (desktop) ──

            canvas.addEventListener('pointerdown', e => {
                if (e.pointerType === 'touch') return; // handled by touch events
                canvas.setPointerCapture(e.pointerId);
                const p = canvasCoords(e.clientX, e.clientY);
                const button = e.button === 2 ? 1 : 0;
                lastClientX = e.clientX;
                lastClientY = e.clientY;
                wasm.js_pointer_down(p.x, p.y, button);
            });

            canvas.addEventListener('pointermove', e => {
                if (e.pointerType === 'touch') return;
                const p = canvasCoords(e.clientX, e.clientY);
                // Use CSS pixel deltas for orbit (not DPR-scaled), matching
                // NSEvent.deltaX/deltaY behavior in the Swift version.
                const dx = e.clientX - lastClientX;
                const dy = e.clientY - lastClientY;
                lastClientX = e.clientX;
                lastClientY = e.clientY;
                wasm.js_pointer_move(p.x, p.y, dx, dy);
            });

            canvas.addEventListener('pointerup', e => {
                if (e.pointerType === 'touch') return;
                wasm.js_pointer_up();
            });

            canvas.addEventListener('wheel', e => {
                e.preventDefault();
                const raw = -e.deltaY;
                const clamped = Math.max(-3, Math.min(3, raw / 30));
                wasm.js_camera_zoom(clamped * 0.5);
            }, { passive: false });

            // ── Multi-touch events (mobile) ──────────────

            const LONG_MS    = 500;   // long-press threshold
            const TAP_THRESH = 8;     // px to consider "moved"
            const DRAG_THRESH = 12;   // px to start camera orbit

            let activeTouches = {};
            let tapTimer = null;
            let tapX = 0, tapY = 0, tapMoved = false;
            let pinchDist = null;
            let trackingCanvas = false;

            function tp(t) { return { x: t.clientX, y: t.clientY }; }

            function clearTap() {
                if (tapTimer !== null) { clearTimeout(tapTimer); tapTimer = null; }
            }

            function isTouchOnCanvas(t) {
                return t.target === canvas || canvas.contains(t.target);
            }

            canvas.addEventListener('touchstart', (e) => {
                const first = e.changedTouches[0];
                if (!trackingCanvas) {
                    if (!isTouchOnCanvas(first)) return;
                    trackingCanvas = true;
                }
                for (const t of e.changedTouches) activeTouches[t.identifier] = tp(t);
                const n = Object.keys(activeTouches).length;
                if (n === 1) {
                    tapX = first.clientX; tapY = first.clientY; tapMoved = false;
                    tapTimer = setTimeout(() => {
                        tapTimer = null;
                        const p = canvasCoords(tapX, tapY);
                        wasm.js_pointer_down(p.x, p.y, 1); // long press = remove
                        wasm.js_pointer_up();
                    }, LONG_MS);
                }
                if (n === 2) {
                    clearTap();
                    const ids = Object.keys(activeTouches);
                    pinchDist = Math.hypot(
                        activeTouches[ids[1]].x - activeTouches[ids[0]].x,
                        activeTouches[ids[1]].y - activeTouches[ids[0]].y
                    );
                }
            }, { passive: true });

            canvas.addEventListener('touchmove', (e) => {
                if (!trackingCanvas) return;
                e.preventDefault();
                const n = Object.keys(activeTouches).length;
                if (n === 1) {
                    const t = e.changedTouches[0];
                    const prev = activeTouches[t.identifier]; if (!prev) return;
                    const dx = t.clientX - prev.x, dy = t.clientY - prev.y;
                    activeTouches[t.identifier] = tp(t);
                    const dist = Math.hypot(t.clientX - tapX, t.clientY - tapY);
                    if (!tapMoved && dist > TAP_THRESH) tapMoved = true;
                    if (dist > DRAG_THRESH) clearTap();
                    if (tapMoved) wasm.js_camera_orbit(dx * 0.5, dy * 0.5);
                } else if (n >= 2) {
                    for (const t of e.changedTouches) {
                        if (t.identifier in activeTouches) activeTouches[t.identifier] = tp(t);
                    }
                    const ids = Object.keys(activeTouches);
                    if (ids.length < 2) return;
                    const nd = Math.hypot(
                        activeTouches[ids[1]].x - activeTouches[ids[0]].x,
                        activeTouches[ids[1]].y - activeTouches[ids[0]].y
                    );
                    if (pinchDist !== null) wasm.js_camera_zoom((nd - pinchDist) * 0.02);
                    pinchDist = nd;
                }
            }, { passive: false });

            function touchEnd(e) {
                for (const t of e.changedTouches) delete activeTouches[t.identifier];
                if (Object.keys(activeTouches).length === 0) {
                    trackingCanvas = false;
                    pinchDist = null;
                    // Tap completed without long-press or drag
                    if (tapTimer !== null && !tapMoved) {
                        clearTap();
                        const p = canvasCoords(tapX, tapY);
                        wasm.js_pointer_down(p.x, p.y, 0); // tap = add voxel
                        wasm.js_pointer_up();
                    }
                    clearTap();
                }
            }
            canvas.addEventListener('touchend', touchEnd, { passive: true });
            canvas.addEventListener('touchcancel', touchEnd, { passive: true });

            // ── Resize ───────────────────────────────────

            const resizeObserver = new ResizeObserver(() => onResize());
            resizeObserver.observe(document.getElementById('viewport'));

            // Screen orientation change (mobile rotation)
            screen.orientation?.addEventListener('change', () => setTimeout(onResize, 150));
        }

        // ── UI update loop ───────────────────────────────

        let lastUiUpdate = 0;
        function uiLoop() {
            const now = performance.now();
            // Throttle WASM state polling to 5 fps — tile/tool state rarely
            // changes and each call crosses the JS↔WASM boundary with JSON.
            if (now - lastUiUpdate > 200) {
                lastUiUpdate = now;
                updateTileGrid();
                updateColorSwatch();
            }
            requestAnimationFrame(uiLoop);
        }

        // ── Start ────────────────────────────────────────

        init();
    </script>
</body>
</html>
