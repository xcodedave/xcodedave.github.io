<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SwiftVoxel — Voxel Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a24; }
    :root {
      --bg: #1a1a24; --panel: #2a2a38; --panel-hi: #3a3a4e;
      --border-lt: #5a5a7a; --border-dk: #0d0d14;
      --text: #ccccdd; --text-dim: #7777aa;
      --accent: #6688cc; --sidebar-w: 220px;
    }
    body { font-family: "Courier New", Courier, monospace; color: var(--text); }
    #layout { display: flex; width: 100%; height: 100%; }
    #viewport { flex: 1 1 auto; position: relative; overflow: hidden; min-width: 0; }
    /* Placeholder canvas — winit replaces this element but preserves id="canvas" */
    #canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      display: block; touch-action: none; cursor: crosshair;
    }
    #sidebar {
      flex: 0 0 var(--sidebar-w); width: var(--sidebar-w);
      background: var(--panel);
      border-left: 2px solid var(--border-lt);
      overflow-y: auto; overflow-x: hidden;
      scrollbar-width: thin; scrollbar-color: var(--panel-hi) var(--panel);
    }
    #sidebar-scroll { display: contents; }
    .section { padding: 6px; border-bottom: 1px solid var(--border-dk); }
    .section-title {
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 5px;
      padding-bottom: 3px; border-bottom: 1px solid var(--border-dk);
    }
    button {
      font-family: inherit; font-size: 11px; color: var(--text);
      background: var(--panel-hi); cursor: pointer; user-select: none;
      border: none; outline: none;
    }
    .btn {
      display: block; width: 100%; padding: 5px 6px; text-align: left;
      border-top: 2px solid var(--border-lt); border-left: 2px solid var(--border-lt);
      border-bottom: 2px solid var(--border-dk); border-right: 2px solid var(--border-dk);
      background: var(--panel-hi); margin-bottom: 3px;
    }
    .btn:active {
      border-top: 2px solid var(--border-dk); border-left: 2px solid var(--border-dk);
      border-bottom: 2px solid var(--border-lt); border-right: 2px solid var(--border-lt);
      padding: 6px 5px 4px 7px;
    }
    .btn.active {
      border-top: 2px solid var(--border-dk); border-left: 2px solid var(--border-dk);
      border-bottom: 2px solid var(--border-lt); border-right: 2px solid var(--border-lt);
      color: #fff; background: var(--accent);
    }
    .btn-row { display: flex; gap: 3px; }
    .btn-row .btn { flex: 1; margin-bottom: 3px; font-size: 10px; }
    #active-color-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    #active-color-swatch {
      width: 28px; height: 28px; flex-shrink: 0;
      border-top: 2px solid var(--border-dk); border-left: 2px solid var(--border-dk);
      border-bottom: 2px solid var(--border-lt); border-right: 2px solid var(--border-lt);
    }
    #active-color-label { font-size: 10px; color: var(--text-dim); }
    #active-wrap { display: flex; gap: 8px; align-items: flex-start; }
    #active-tile-canvas {
      width: 36px; height: 36px; display: block;
      image-rendering: pixelated; image-rendering: crisp-edges;
      background: var(--border-dk);
      border-top: 2px solid var(--border-dk); border-left: 2px solid var(--border-dk);
      border-bottom: 2px solid var(--border-lt); border-right: 2px solid var(--border-lt);
    }
    #active-tile-label { font-size: 10px; color: var(--text-dim); margin-top: 3px; }
    #palette-grid {
      display: grid; grid-template-columns: repeat(16, 1fr);
      gap: 1px; background: var(--border-dk);
      border: 1px solid var(--border-dk); margin-bottom: 4px;
      max-height: 120px; overflow-y: auto;
    }
    .swatch { aspect-ratio: 1; cursor: pointer; position: relative; }
    .swatch:hover::after { content:''; position:absolute; inset:0; background:rgba(255,255,255,.3); }
    .swatch.selected::after { content:''; position:absolute; inset:0; box-shadow:inset 0 0 0 2px #fff; }
    .swatch-transparent { background: repeating-conic-gradient(#555 0% 25%, #888 0% 50%) 0 0/6px 6px; }
    #tile-list { margin-bottom: 3px; }
    .tile-grid {
      display: grid; grid-template-columns: repeat(4, 40px);
      gap: 3px; padding: 2px; max-height: 220px; overflow-y: auto;
    }
    .tile-cell {
      width: 40px; height: 40px; position: relative; cursor: pointer;
      background: var(--border-dk);
      border-top: 2px solid var(--border-dk); border-left: 2px solid var(--border-dk);
      border-bottom: 2px solid var(--border-lt); border-right: 2px solid var(--border-lt);
      display: flex; align-items: center; justify-content: center;
    }
    .tile-cell canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
    .tile-cell.selected::before {
      content: ''; position: absolute; inset: 0;
      border: 2px solid #000; z-index: 1; pointer-events: none;
    }
    .tile-cell.selected::after {
      content: ''; position: absolute; inset: 2px;
      border: 1px solid #fff; z-index: 1; pointer-events: none;
    }
    #status-overlay {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      background: rgba(26,26,36,.93); font-size: 14px;
      color: var(--text-dim); text-align: center; padding: 20px;
      z-index: 100; pointer-events: none; white-space: pre-line;
    }
    #help-hint {
      position: absolute; bottom: 10px; left: 10px;
      font-size: 9px; color: rgba(120,120,160,.65);
      line-height: 1.6; pointer-events: none;
    }
    @media (max-width: 680px) {
      #layout { flex-direction: column; }
      #sidebar {
        flex: 0 0 auto; width: 100%; max-height: 44vh;
        flex-direction: row; flex-wrap: wrap;
        border-left: none; border-top: 2px solid var(--border-lt);
        overflow-x: auto;
      }
      #sidebar-scroll { display: contents; }
      .section { flex: 0 0 auto; min-width: 110px; }
      #section-palette { flex: 0 0 100%; }
      #section-tiles { min-width: 185px; }
      #palette-grid { grid-template-columns: repeat(32, 1fr); max-height: none; }
      #help-hint { display: none; }
    }
  </style>
</head>
<body>
<div id="layout">
  <div id="viewport">
    <canvas id="canvas"></canvas>
    <div id="status-overlay">Loading…</div>
    <div id="help-hint">
      DRAG — orbit  |  SCROLL — zoom  |  OPT+DRAG — pan<br>
      LMB — add voxel  |  RMB — remove voxel
    </div>
  </div>
  <div id="sidebar">
    <div id="sidebar-scroll">
      <div class="section" id="section-active">
        <div id="active-wrap">
          <div style="flex:1">
            <div class="section-title">COLOR</div>
            <div id="active-color-wrap">
              <div id="active-color-swatch"></div>
              <span id="active-color-label">IDX 1</span>
            </div>
          </div>
          <div>
            <div class="section-title">TILE</div>
            <canvas id="active-tile-canvas" width="36" height="36"></canvas>
            <div id="active-tile-label">—</div>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">TOOL</div>
        <div class="btn-row">
          <button class="btn active" id="btn-paint"  onclick="setTool('paint')">PAINT</button>
          <button class="btn"        id="btn-sculpt" onclick="setTool('sculpt')">TILE</button>
        </div>
      </div>
      <div class="section">
        <div class="section-title">RENDER</div>
        <button class="btn active" id="btn-lighting" onclick="toggleLighting()">LIGHTING ON</button>
      </div>
      <div class="section" id="section-tiles">
        <div class="section-title">TILES</div>
        <div id="tile-list"></div>
      </div>
      <div class="section" id="section-palette">
        <div class="section-title">PALETTE</div>
        <div id="palette-grid"></div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">FILE</div>
      <button class="btn" onclick="saveFile()">SAVE .SVOX</button>
      <button class="btn" onclick="loadFile()">OPEN .SVOX</button>
      <button class="btn" onclick="exportVox()">EXPORT .VOX</button>
      <button class="btn" onclick="importVox()">IMPORT .VOX</button>
    </div>
    <div class="section">
      <div class="section-title">MOBILE CONTROLS</div>
      <div style="font-size:9px;color:var(--text-dim);line-height:1.8">
        TAP — add voxel<br>
        LONG PRESS — remove<br>
        DRAG — orbit camera<br>
        PINCH — zoom
      </div>
    </div>
  </div>
</div>
<input type="file" id="file-input" accept=".svox" style="display:none">
<input type="file" id="vox-input"  accept=".vox"  style="display:none">
<script type="module">
import init_wasm, * as wasm from './pkg/swift_voxel_web.js?v=20260327_02';

let wasmReady = false;
let activeColorIndex = 1;
let activeTool = 'paint';
let lightingOn = true;
let paletteColors = [];

// ─── Readiness polling ─────────────────────────────────────────────────────
async function waitForReady(timeoutMs = 20000) {
  const deadline = Date.now() + timeoutMs;
  while (Date.now() < deadline) {
    await new Promise(r => requestAnimationFrame(r));
    if (wasm.js_is_ready()) return true;
  }
  return false;
}

// ─── Canvas helpers ────────────────────────────────────────────────────────
function getCanvas() { return document.getElementById('canvas'); }

function canvasCoords(clientX, clientY) {
  const c = getCanvas();
  const rect = c.getBoundingClientRect();
  const dpr = c.width / (rect.width || 1);
  return { x: (clientX - rect.left) * dpr, y: (clientY - rect.top) * dpr };
}

// ─── Viewport resize ───────────────────────────────────────────────────────
function onResize() {
  const vp = document.getElementById('viewport');
  const c  = getCanvas();
  if (vp && c) { c.width = vp.clientWidth; c.height = vp.clientHeight; }
}

// ─── Touch + wheel event setup ─────────────────────────────────────────────
function setupCanvasListeners() {
  const c = getCanvas();
  if (!c) { console.error('setupCanvasListeners: #canvas not found'); return; }

  c.addEventListener('wheel', (e) => { e.preventDefault(); }, { passive: false });

  let activeTouches = {};
  let pinchDist = null;
  let tapX = 0, tapY = 0, tapMoved = false, tapTimer = null;
  let trackingCanvas = false;
  const LONG_MS = 500, TAP_THRESH = 20, DRAG_THRESH = 30;

  function tp(t) { return { x: t.clientX, y: t.clientY }; }
  function clearTap() { if (tapTimer) { clearTimeout(tapTimer); tapTimer = null; } }

  function isTouchOnCanvas(t) {
    const rect = getCanvas().getBoundingClientRect();
    return t.clientX >= rect.left && t.clientX <= rect.right &&
           t.clientY >= rect.top  && t.clientY <= rect.bottom;
  }

  window.addEventListener('touchstart', (e) => {
    const first = e.changedTouches[0];
    if (!trackingCanvas) {
      if (!isTouchOnCanvas(first)) return;
      trackingCanvas = true;
    }

    for (const t of e.changedTouches) activeTouches[t.identifier] = tp(t);
    const n = Object.keys(activeTouches).length;

    if (n === 1) {
      tapX = first.clientX; tapY = first.clientY; tapMoved = false;
      tapTimer = setTimeout(() => {
        tapTimer = null;
        const p = canvasCoords(tapX, tapY);
        wasm.js_pointer_down(p.x, p.y, 1);
        wasm.js_pointer_up();
      }, LONG_MS);
    }
    if (n === 2) {
      clearTap();
      const ids = Object.keys(activeTouches);
      pinchDist = Math.hypot(activeTouches[ids[1]].x - activeTouches[ids[0]].x,
                             activeTouches[ids[1]].y - activeTouches[ids[0]].y);
    }
  }, { passive: true });

  window.addEventListener('touchmove', (e) => {
    if (!trackingCanvas) return;
    e.preventDefault();

    const n = Object.keys(activeTouches).length;
    if (n === 1) {
      const t = e.changedTouches[0];
      const prev = activeTouches[t.identifier]; if (!prev) return;
      const dx = t.clientX - prev.x, dy = t.clientY - prev.y;
      activeTouches[t.identifier] = tp(t);
      const dist = Math.hypot(t.clientX - tapX, t.clientY - tapY);
      if (!tapMoved && dist > TAP_THRESH) tapMoved = true;
      if (dist > DRAG_THRESH) clearTap();
      if (tapMoved) wasm.js_camera_orbit(dx * 0.5, dy * 0.5);
    } else if (n >= 2) {
      for (const t of e.changedTouches) {
        if (t.identifier in activeTouches) activeTouches[t.identifier] = tp(t);
      }
      const ids = Object.keys(activeTouches);
      if (ids.length < 2) return;
      const nd = Math.hypot(activeTouches[ids[1]].x - activeTouches[ids[0]].x,
                            activeTouches[ids[1]].y - activeTouches[ids[0]].y);
      if (pinchDist !== null) wasm.js_camera_zoom((nd - pinchDist) * 0.02);
      pinchDist = nd;
    }
  }, { passive: false });

  window.addEventListener('touchend', (e) => {
    if (!trackingCanvas) return;
    for (const t of e.changedTouches) delete activeTouches[t.identifier];
    if (Object.keys(activeTouches).length === 0) {
      trackingCanvas = false;
      pinchDist = null;
      if (!tapMoved && tapTimer !== null) {
        clearTap();
        const p = canvasCoords(tapX, tapY);
        wasm.js_pointer_down(p.x, p.y, 0);
        wasm.js_pointer_up();
      } else {
        clearTap();
      }
      tapMoved = false;
    }
  }, { passive: true });

  window.addEventListener('touchcancel', (e) => {
    if (!trackingCanvas) return;
    for (const t of e.changedTouches) delete activeTouches[t.identifier];
    if (Object.keys(activeTouches).length === 0) {
      trackingCanvas = false;
      pinchDist = null;
      clearTap();
      tapMoved = false;
    }
  }, { passive: true });

  onResize();
}

// ─── Init ──────────────────────────────────────────────────────────────────
async function init() {
  const overlay = document.getElementById('status-overlay');

  overlay.textContent = 'Loading WASM…';
  try {
    const wasmUrl = new URL('./pkg/swift_voxel_web_bg.wasm', location.href);
    wasmUrl.searchParams.set('v', '20260327_02');
    await init_wasm({ module_or_path: wasmUrl });
  } catch (e) {
    if (!e?.message?.includes('Using exceptions for control flow')) {
      overlay.textContent = 'Failed: ' + (e?.message ?? String(e));
      console.error(e); return;
    }
  }

  overlay.textContent = 'Initialising GPU…';
  const ready = await waitForReady();
  if (!ready) {
    overlay.textContent = 'GPU initialisation timed out.\nCheck browser console for errors.';
    return;
  }

  setupCanvasListeners();

  wasmReady = true;
  wasm.js_set_tool(activeTool);

  overlay.style.display = 'none';

  buildPalette();
  syncUIState();
  setInterval(syncUIState, 2000);
}

// ─── Palette ───────────────────────────────────────────────────────────────
function buildPalette() {
  const grid = document.getElementById('palette-grid');
  grid.innerHTML = '';
  let colors;
  try { colors = JSON.parse(wasm.js_get_palette_json()); } catch { return; }
  paletteColors = colors;
  for (let i = 0; i < 256; i++) {
    const el = document.createElement('div');
    el.className = 'swatch' + (i === 0 ? ' swatch-transparent' : '');
    el.dataset.idx = i;
    if (i > 0) el.style.background = colors[i];
    if (i === activeColorIndex) el.classList.add('selected');
    el.title = i === 0 ? 'Transparent (index 0)' : `Index ${i}: ${colors[i]}`;
    el.addEventListener('click', () => pickColor(i, colors[i]));
    grid.appendChild(el);
  }
  updateActiveColorUI(colors[activeColorIndex]);
}

function pickColor(idx, hex) {
  if (idx === 0) return;
  activeColorIndex = idx;
  wasm.js_set_color_index(idx);
  document.querySelectorAll('.swatch.selected').forEach(el => el.classList.remove('selected'));
  const el = document.querySelector(`.swatch[data-idx="${idx}"]`);
  if (el) el.classList.add('selected');
  updateActiveColorUI(hex);
  setTool('paint');
}

function updateActiveColorUI(hex) {
  document.getElementById('active-color-swatch').style.background = hex || '#888';
  document.getElementById('active-color-label').textContent = `IDX ${activeColorIndex}`;
}

function updateActiveTileUI(tileIndex) {
  const canvas = document.getElementById('active-tile-canvas');
  const label = document.getElementById('active-tile-label');
  if (!canvas) return;
  if (!wasmReady || tileIndex < 0 || !paletteColors.length) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 36, 36);
    if (label) label.textContent = '—';
    return;
  }
  renderTileIcon(canvas, wasm.js_get_tile_data(tileIndex), paletteColors);
  if (label) label.textContent = `#${tileIndex}`;
}

// ─── Tool / render controls ────────────────────────────────────────────────
window.setTool = function(tool) {
  activeTool = tool;
  if (wasmReady) wasm.js_set_tool(tool);
  document.getElementById('btn-sculpt').classList.toggle('active', tool === 'sculpt');
  document.getElementById('btn-paint').classList.toggle('active',  tool === 'paint');
};

window.toggleLighting = function() {
  lightingOn = !lightingOn;
  if (wasmReady) wasm.js_toggle_lighting();
  const btn = document.getElementById('btn-lighting');
  btn.textContent = lightingOn ? 'LIGHTING ON' : 'LIGHTING OFF';
  btn.classList.toggle('active', lightingOn);
};

// ─── File I/O ──────────────────────────────────────────────────────────────
window.saveFile  = () => { if (!wasmReady) return; triggerDownload(wasm.js_save_svox(),  'scene.svox', 'application/octet-stream'); };
window.loadFile  = () => document.getElementById('file-input').click();
window.exportVox = () => { if (!wasmReady) return; triggerDownload(wasm.js_export_vox(), 'scene.vox',  'application/octet-stream'); };
window.importVox = () => document.getElementById('vox-input').click();

document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0]; if (!file || !wasmReady) return;
  const ok = wasm.js_load_svox(new Uint8Array(await file.arrayBuffer()));
  if (!ok) alert('Failed to load .svox file.');
  else { buildPalette(); syncUIState(); }
  e.target.value = '';
});
document.getElementById('vox-input').addEventListener('change', async (e) => {
  const file = e.target.files[0]; if (!file || !wasmReady) return;
  const ok = wasm.js_import_vox(new Uint8Array(await file.arrayBuffer()));
  if (!ok) alert('Failed to import .vox file.');
  else { buildPalette(); syncUIState(); }
  e.target.value = '';
});

function triggerDownload(bytes, name, mime) {
  if (!bytes || !bytes.length) { alert('Nothing to save.'); return; }
  const url = URL.createObjectURL(new Blob([bytes], { type: mime }));
  const a = document.createElement('a'); a.href = url; a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function syncUIState() {
  if (!wasmReady) return;
  try {
    const s = JSON.parse(wasm.js_get_editor_state_json());
    syncTileList(s);
  } catch {}
}

// ─── Isometric tile icon renderer ─────────────────────────────────────────
function renderTileIcon(canvas, tileData, colors) {
  const S = 36;
  canvas.width = S; canvas.height = S;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, S, S);
  if (!tileData || !tileData.length) return;

  function proj(x, y, z) {
    return [(x - z) * 2 + S / 2, (S / 2 - 1) + (x + z) - y * 2];
  }
  function quad(p0, p1, p2, p3) {
    ctx.beginPath();
    ctx.moveTo(p0[0], p0[1]); ctx.lineTo(p1[0], p1[1]);
    ctx.lineTo(p2[0], p2[1]); ctx.lineTo(p3[0], p3[1]);
    ctx.closePath(); ctx.fill();
  }

  for (let z = 7; z >= 0; z--) {
    for (let x = 0; x < 8; x++) {
      for (let y = 0; y < 8; y++) {
        const ci = tileData[x + y * 8 + z * 64];
        if (ci === 0) continue;
        const hex = colors[ci] || '#888';
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        ctx.fillStyle = `rgb(${r * 0.7 | 0},${g * 0.7 | 0},${b * 0.7 | 0})`;
        quad(proj(x, y+1, z), proj(x+1, y+1, z), proj(x+1, y, z), proj(x, y, z));
        ctx.fillStyle = `rgb(${r * 0.85 | 0},${g * 0.85 | 0},${b * 0.85 | 0})`;
        quad(proj(x+1, y+1, z), proj(x+1, y+1, z+1), proj(x+1, y, z+1), proj(x+1, y, z));
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        quad(proj(x, y+1, z), proj(x+1, y+1, z), proj(x+1, y+1, z+1), proj(x, y+1, z+1));
      }
    }
  }
}

function syncTileList(state) {
  const list = document.getElementById('tile-list');
  const count = state?.tileCount ?? 0;
  const sel = state?.selectedTileIndex ?? -1;

  if (count === 0) {
    list.innerHTML = '<div style="font-size:10px;color:var(--text-dim);padding:4px">No tiles yet</div>';
    return;
  }

  let grid = list.querySelector('.tile-grid');
  if (!grid || grid.children.length !== count) {
    list.innerHTML = '';
    grid = document.createElement('div');
    grid.className = 'tile-grid';
    for (let i = 0; i < count; i++) {
      const cell = document.createElement('div');
      cell.className = 'tile-cell';
      cell.onclick = () => selectTile(i);
      const canvas = document.createElement('canvas');
      cell.appendChild(canvas);
      grid.appendChild(cell);
    }
    list.appendChild(grid);
  }

  const cells = grid.children;
  for (let i = 0; i < cells.length; i++) {
    cells[i].classList.toggle('selected', i === sel);
    if (paletteColors.length) {
      renderTileIcon(cells[i].querySelector('canvas'), wasm.js_get_tile_data(i), paletteColors);
    }
  }
  updateActiveTileUI(sel);
}

window.selectTile = function(index) {
  if (!wasmReady) return;
  wasm.js_select_tile(index);
  setTool('sculpt');
  updateActiveTileUI(index);
  syncUIState();
};

// ─── Resize ────────────────────────────────────────────────────────────────
window.addEventListener('resize', onResize);
screen.orientation?.addEventListener('change', () => setTimeout(onResize, 150));

init();
</script>
</body>
</html>
