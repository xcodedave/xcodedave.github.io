<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SwiftVoxel — WebGPU Voxel Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #1a1a24; overflow: hidden; }
        canvas {
            width: 100vw;
            height: 100dvh;
            display: block;
            touch-action: none;
        }
        #status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #aaa;
            font-family: monospace;
            font-size: 16px;
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="status">Loading WebGPU...</div>
    <script type="module">
        async function init() {
            const status = document.getElementById('status');

            if (!navigator.gpu) {
                status.textContent = 'WebGPU is not supported in this browser.\nTry Chrome 113+ or Edge 113+ on desktop.';
                return;
            }

            try {
                const { default: init_wasm } = await import('./pkg/swift_voxel_web.js');
                await init_wasm();
                status.style.display = 'none';
            } catch (e) {
                // wasm-bindgen uses JS exceptions internally for control flow — ignore those.
                if (e && e.message && e.message.includes('Using exceptions for control flow')) {
                    status.style.display = 'none';
                    return;
                }
                status.textContent = 'Failed to initialize: ' + (e && e.message ? e.message : e);
                console.error(e);
            }
        }

        // Notify winit of viewport size changes (orientation change, browser chrome hide/show).
        function onResize() {
            const canvas = document.getElementById('canvas');
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                // Dispatch a resize event so winit picks it up.
                canvas.dispatchEvent(new Event('resize'));
            }
        }

        window.addEventListener('resize', onResize);
        screen.orientation && screen.orientation.addEventListener('change', onResize);

        init();
    </script>
</body>
</html>
