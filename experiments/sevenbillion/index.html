<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>7,000,000,000</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        #error {
            position: absolute;
            top: 0; left: 0;
            color: red;
            font-family: monospace;
            padding: 20px;
            white-space: pre-wrap;
            z-index: 10;
            display: none;
        }
    </style>
</head>
<body>
<div id="error"></div>
<script>
// Audio manager — runs before WASM, sets up Web Audio with Safari unlock.
// Functions are called from WASM via window globals.
(function() {
    var ctx = null;
    var buffers = {};
    var rawData = {};
    var musicSource = null;
    var silentAudio = null;
    var dbgEl = null;
    var dbgLines = [];

    function dbg(msg) {
        dbgLines.push(msg);
        if (dbgLines.length > 8) dbgLines.shift();
        if (!dbgEl) {
            dbgEl = document.createElement('div');
            dbgEl.style.cssText = 'position:fixed;bottom:0;left:0;right:0;color:#0f0;background:rgba(0,0,0,0.8);font:11px monospace;padding:6px;z-index:9999;pointer-events:none;white-space:pre;';
            document.body.appendChild(dbgEl);
        }
        dbgEl.textContent = dbgLines.join('\n');
    }

    function createCtx() {
        if (ctx) return;
        try {
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            dbg('ctx created, state=' + ctx.state + ', sr=' + ctx.sampleRate);
            ctx.onstatechange = function() { dbg('ctx state -> ' + ctx.state); };
        } catch(e) {
            dbg('ctx create FAILED: ' + e);
        }
    }

    function doDecode(name) {
        if (!ctx || !rawData[name] || buffers[name]) return;
        var ab = rawData[name].buffer.slice(0);
        dbg('decoding ' + name + ' (' + ab.byteLength + ' bytes)...');
        ctx.decodeAudioData(ab,
            function(decoded) {
                buffers[name] = decoded;
                dbg('decoded ' + name + ': ' + decoded.duration.toFixed(1) + 's, ' + decoded.numberOfChannels + 'ch');
            },
            function(err) {
                dbg('DECODE FAIL ' + name + ': ' + err);
            }
        );
    }

    function unlockAudio(e) {
        createCtx();
        dbg('unlock from ' + e.type + ', state=' + ctx.state);
        if (ctx.state === 'suspended' || ctx.state === 'interrupted') {
            ctx.resume().then(function() {
                dbg('resume ok, state=' + ctx.state);
            }).catch(function(err) {
                dbg('resume FAIL: ' + err);
            });
        }
        // Play silent buffer to warm up audio hardware
        try {
            var b = ctx.createBuffer(1, 1, 22050);
            var s = ctx.createBufferSource();
            s.buffer = b;
            s.connect(ctx.destination);
            s.start(0);
        } catch(e2) { dbg('silent buf err: ' + e2); }
        // Play a looping silent HTML5 Audio element to force WebAudio onto
        // the "media" channel. This bypasses the iOS mute switch, which
        // silences Web Audio API but not HTML5 Audio.
        if (!silentAudio) {
            try {
                silentAudio = new Audio('data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQIAAAAAAA==');
                silentAudio.loop = true;
                silentAudio.volume = 0.001;
                silentAudio.play().then(function() {
                    dbg('html5 silent audio playing (mute bypass)');
                }).catch(function(err) {
                    dbg('html5 silent audio fail: ' + err);
                });
            } catch(e3) { dbg('html5 audio err: ' + e3); }
        }
        // Re-decode any buffers that may have failed
        for (var n in rawData) {
            if (!buffers[n]) doDecode(n);
        }
    }

    ['touchstart','touchend','mousedown','click','keydown'].forEach(function(e) {
        document.addEventListener(e, unlockAudio, {passive: true});
    });

    window.sbAudioRegister = function(name, data) {
        dbg('register ' + name + ' (' + data.length + ' bytes)');
        rawData[name] = new Uint8Array(data);
        createCtx();
        doDecode(name);
    };

    window.sbAudioPlay = function(name, volume, pitch, looping) {
        if (!ctx) { return false; }
        if (ctx.state !== 'running') { return false; }
        if (!buffers[name]) { return false; }
        try {
            var src = ctx.createBufferSource();
            src.buffer = buffers[name];
            src.loop = looping;
            src.playbackRate.value = pitch;
            var gain = ctx.createGain();
            gain.gain.value = volume;
            src.connect(gain);
            gain.connect(ctx.destination);
            src.start(0);
            if (looping) {
                if (musicSource) try { musicSource.stop(); } catch(e) {}
                musicSource = src;
            }
            dbg('play ' + name + ' vol=' + volume + ' loop=' + looping + ' OK');
            return true;
        } catch(err) {
            dbg('play ' + name + ' ERROR: ' + err);
            return false;
        }
    };

    window.sbAudioStopMusic = function() {
        if (musicSource) {
            try { musicSource.stop(); } catch(e) {}
            musicSource = null;
            dbg('music stopped');
        }
    };

    dbg('audio manager loaded');
})();
</script>
<script type="module">
    import init from './pkg/sevenbillion.js';

    function showError(msg) {
        const el = document.getElementById('error');
        el.style.display = 'block';
        el.textContent += msg + '\n';
    }

    try {
        await init();
    } catch (e) {
        // winit uses exceptions for control flow in WASM — this is expected
        const msg = String(e);
        if (msg.includes('Using exceptions for control flow')) {
            // Normal winit behavior, not an error
        } else {
            showError('Init error: ' + e + '\n' + (e.stack || ''));
            console.error(e);
        }
    }

    window.addEventListener('error', (e) => {
        if (String(e.message).includes('Using exceptions for control flow')) return;
        showError('Runtime error: ' + e.message);
    });
    window.addEventListener('unhandledrejection', (e) => {
        if (String(e.reason).includes('Using exceptions for control flow')) return;
        showError('Unhandled rejection: ' + e.reason);
    });
</script>
</body>
</html>
