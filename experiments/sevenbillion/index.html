<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>7,000,000,000</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        #error {
            position: absolute;
            top: 0; left: 0;
            color: red;
            font-family: monospace;
            padding: 20px;
            white-space: pre-wrap;
            z-index: 10;
            display: none;
        }
    </style>
</head>
<body>
<div id="error"></div>
<script>
// Audio manager — runs before WASM, sets up Web Audio with Safari unlock.
// Functions are called from WASM via window globals.
(function() {
    var ctx = null;
    var buffers = {};
    var rawData = {};
    var musicSource = null;

    function createCtx() {
        if (ctx) return;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function doDecode(name) {
        if (!ctx || !rawData[name] || buffers[name]) return;
        var ab = rawData[name].buffer.slice(0);
        ctx.decodeAudioData(ab,
            function(decoded) { buffers[name] = decoded; },
            function(err) { console.error('Audio decode error: ' + name, err); }
        );
    }

    function unlockAudio() {
        createCtx();
        if (ctx.state === 'suspended' || ctx.state === 'interrupted') {
            ctx.resume();
        }
        // Play silent buffer to warm up audio hardware (howler.js technique)
        try {
            var b = ctx.createBuffer(1, 1, 22050);
            var s = ctx.createBufferSource();
            s.buffer = b;
            s.connect(ctx.destination);
            s.start(0);
        } catch(e) {}
        // Re-decode any buffers that may have failed while ctx was suspended
        for (var n in rawData) {
            if (!buffers[n]) doDecode(n);
        }
    }

    ['touchstart','touchend','mousedown','click','keydown'].forEach(function(e) {
        document.addEventListener(e, unlockAudio, {passive: true});
    });

    window.sbAudioRegister = function(name, data) {
        rawData[name] = new Uint8Array(data);
        createCtx();
        doDecode(name);
    };

    window.sbAudioPlay = function(name, volume, pitch, looping) {
        if (!ctx || ctx.state !== 'running' || !buffers[name]) return false;
        var src = ctx.createBufferSource();
        src.buffer = buffers[name];
        src.loop = looping;
        src.playbackRate.value = pitch;
        var gain = ctx.createGain();
        gain.gain.value = volume;
        src.connect(gain);
        gain.connect(ctx.destination);
        src.start(0);
        if (looping) {
            if (musicSource) try { musicSource.stop(); } catch(e) {}
            musicSource = src;
        }
        return true;
    };

    window.sbAudioStopMusic = function() {
        if (musicSource) {
            try { musicSource.stop(); } catch(e) {}
            musicSource = null;
        }
    };
})();
</script>
<script type="module">
    import init from './pkg/sevenbillion.js';

    function showError(msg) {
        const el = document.getElementById('error');
        el.style.display = 'block';
        el.textContent += msg + '\n';
    }

    try {
        await init();
    } catch (e) {
        // winit uses exceptions for control flow in WASM — this is expected
        const msg = String(e);
        if (msg.includes('Using exceptions for control flow')) {
            // Normal winit behavior, not an error
        } else {
            showError('Init error: ' + e + '\n' + (e.stack || ''));
            console.error(e);
        }
    }

    window.addEventListener('error', (e) => {
        if (String(e.message).includes('Using exceptions for control flow')) return;
        showError('Runtime error: ' + e.message);
    });
    window.addEventListener('unhandledrejection', (e) => {
        if (String(e.reason).includes('Using exceptions for control flow')) return;
        showError('Unhandled rejection: ' + e.reason);
    });
</script>
</body>
</html>
