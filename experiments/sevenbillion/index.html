<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>7,000,000,000</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        #error {
            position: absolute;
            top: 0; left: 0;
            color: red;
            font-family: monospace;
            padding: 20px;
            white-space: pre-wrap;
            z-index: 10;
            display: none;
        }
    </style>
</head>
<body>
<div id="error"></div>
<script>
// Audio manager — runs before WASM, sets up Web Audio with Safari unlock.
// Handles iOS mute switch via two layers:
//   1. navigator.audioSession.type = "playback" (iOS 17+)
//   2. Looping silent HTML5 Audio element forces media channel (legacy iOS)
// Functions are called from WASM via window globals.
(function() {
    var ctx = null;
    var buffers = {};
    var rawData = {};
    var musicSource = null;
    var silentAudio = null;

    // Layer 1: Modern audio session API (iOS 17+ / Safari 16.4+)
    // Sets AVAudioSession category to "playback" which ignores the mute switch.
    if ('audioSession' in navigator) {
        navigator.audioSession.type = 'playback';
    }

    // High-quality silent MP3 for the HTML5 Audio mute-switch bypass.
    // Must be a real encoded MP3 (not WAV) at decent bitrate — iOS mixes
    // WebAudio at the same quality as the HTML5 audio element.
    // This is a ~0.01s silent VBR joint-stereo MP3 (from unmute libraries).
    var SILENCE_MP3 = 'data:audio/mpeg;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAACAAACcQCAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICA//////////////////////////////////////////////////////////////////8AAABhTEFNRTMuMTAwA8MAAAAAAAAAABQgJAUHQQAB9AAAAnGMHkkIAAAAAAAAAAAAAAAAAAAAAAAA//sQxAADgnABGiAAQBCqgCRMAAgEAH///////////////7+n/9FTuQsQH//////2NG0jWUGlio5gLQTOtIoeR2WX////X4s9Atb/JRVCbBUpeRUq//////////////////9RUi0f2jn/+xDECgPCjAEQAABN4AAANIAAAAQVTEFNRTMuMTAw';

    function createCtx() {
        if (ctx) return;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        ctx.onstatechange = function() {
            // Auto-resume if context gets interrupted (e.g. phone call, tab switch)
            if (ctx.state === 'interrupted' || ctx.state === 'suspended') {
                ctx.resume().catch(function(){});
            }
        };
    }

    function doDecode(name) {
        if (!ctx || !rawData[name] || buffers[name]) return;
        var ab = rawData[name].buffer.slice(0);
        ctx.decodeAudioData(ab,
            function(decoded) { buffers[name] = decoded; },
            function(err) { console.error('Audio decode error: ' + name, err); }
        );
    }

    function unlockAudio() {
        createCtx();
        if (ctx.state === 'suspended' || ctx.state === 'interrupted') {
            ctx.resume().catch(function(){});
        }
        // Play silent WebAudio buffer to warm up the audio hardware
        try {
            var b = ctx.createBuffer(1, 1, 22050);
            var s = ctx.createBufferSource();
            s.buffer = b;
            s.connect(ctx.destination);
            s.start(0);
        } catch(e) {}
        // Layer 2: Play a looping silent HTML5 Audio MP3 to force WebAudio
        // onto the "media" audio channel, bypassing the iOS mute switch.
        // The <audio> element activates the media channel; iOS then mixes
        // WebAudio into it. They play independently (not piped through).
        if (!silentAudio) {
            silentAudio = document.createElement('audio');
            silentAudio.setAttribute('x-webkit-airplay', 'deny');
            silentAudio.preload = 'auto';
            silentAudio.loop = true;
            silentAudio.src = SILENCE_MP3;
            silentAudio.load();
        }
        silentAudio.play().catch(function(){});
        // Re-decode any buffers that may have failed while ctx was suspended
        for (var n in rawData) {
            if (!buffers[n]) doDecode(n);
        }
    }

    ['touchstart','touchend','mousedown','click','keydown'].forEach(function(e) {
        document.addEventListener(e, unlockAudio, {passive: true, capture: true});
    });

    // Also re-activate when returning from background
    document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible' && silentAudio) {
            silentAudio.play().catch(function(){});
            if (ctx && ctx.state !== 'running') {
                ctx.resume().catch(function(){});
            }
        }
    });

    window.sbAudioRegister = function(name, data) {
        rawData[name] = new Uint8Array(data);
        createCtx();
        doDecode(name);
    };

    window.sbAudioPlay = function(name, volume, pitch, looping) {
        if (!ctx || ctx.state !== 'running' || !buffers[name]) return false;
        try {
            var src = ctx.createBufferSource();
            src.buffer = buffers[name];
            src.loop = looping;
            src.playbackRate.value = pitch;
            var gain = ctx.createGain();
            gain.gain.value = volume;
            src.connect(gain);
            gain.connect(ctx.destination);
            src.start(0);
            if (looping) {
                if (musicSource) try { musicSource.stop(); } catch(e) {}
                musicSource = src;
            }
            return true;
        } catch(err) {
            return false;
        }
    };

    window.sbAudioStopMusic = function() {
        if (musicSource) {
            try { musicSource.stop(); } catch(e) {}
            musicSource = null;
        }
    };
})();
</script>
<script type="module">
    import init from './pkg/sevenbillion.js';

    function showError(msg) {
        const el = document.getElementById('error');
        el.style.display = 'block';
        el.textContent += msg + '\n';
    }

    try {
        await init();
    } catch (e) {
        // winit uses exceptions for control flow in WASM — this is expected
        const msg = String(e);
        if (msg.includes('Using exceptions for control flow')) {
            // Normal winit behavior, not an error
        } else {
            showError('Init error: ' + e + '\n' + (e.stack || ''));
            console.error(e);
        }
    }

    window.addEventListener('error', (e) => {
        if (String(e.message).includes('Using exceptions for control flow')) return;
        showError('Runtime error: ' + e.message);
    });
    window.addEventListener('unhandledrejection', (e) => {
        if (String(e.reason).includes('Using exceptions for control flow')) return;
        showError('Unhandled rejection: ' + e.reason);
    });
</script>
</body>
</html>
