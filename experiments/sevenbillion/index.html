<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>7,000,000,000</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        #error {
            position: absolute;
            top: 0; left: 0;
            color: red;
            font-family: monospace;
            padding: 20px;
            white-space: pre-wrap;
            z-index: 10;
            display: none;
        }
    </style>
</head>
<body>
<div id="error"></div>
<script type="module">
    import init from './pkg/sevenbillion.js';

    function showError(msg) {
        const el = document.getElementById('error');
        el.style.display = 'block';
        el.textContent += msg + '\n';
    }

    try {
        await init();
    } catch (e) {
        // winit uses exceptions for control flow in WASM — this is expected
        const msg = String(e);
        if (msg.includes('Using exceptions for control flow')) {
            // Normal winit behavior, not an error
        } else {
            showError('Init error: ' + e + '\n' + (e.stack || ''));
            console.error(e);
        }
    }

    window.addEventListener('error', (e) => {
        if (String(e.message).includes('Using exceptions for control flow')) return;
        showError('Runtime error: ' + e.message);
    });
    window.addEventListener('unhandledrejection', (e) => {
        if (String(e.reason).includes('Using exceptions for control flow')) return;
        showError('Unhandled rejection: ' + e.reason);
    });
</script>
</body>
</html>
