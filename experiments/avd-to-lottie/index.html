<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AVD <> Lottie Converter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 40px;
  }
  h1 {
    margin: 24px 0 8px;
    font-size: 1.5rem;
    color: #a0c4ff;
  }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 20px; text-align: center; padding: 0 16px; }

  #loading {
    margin-top: 60px;
    text-align: center;
    color: #888;
    font-size: 0.95rem;
  }
  #loading .spinner {
    display: inline-block;
    width: 24px; height: 24px;
    border: 3px solid #333;
    border-top-color: #a0c4ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #app { display: none; width: 100%; flex-direction: column; align-items: center; }

  #drop-zone {
    width: 90%;
    max-width: 600px;
    min-height: 160px;
    border: 2px dashed #444;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  #drop-zone.hover {
    border-color: #a0c4ff;
    background: rgba(160, 196, 255, 0.05);
  }
  #drop-zone p { font-size: 1rem; color: #888; }
  #drop-zone .browse {
    margin-top: 12px;
    padding: 8px 20px;
    background: #2a2a4a;
    border: 1px solid #555;
    border-radius: 6px;
    color: #a0c4ff;
    cursor: pointer;
    font-size: 0.9rem;
  }
  #drop-zone .browse:hover { background: #3a3a5a; }
  #file-input { display: none; }

  #error {
    width: 90%;
    max-width: 600px;
    background: #3a1a1a;
    border: 1px solid #ff6b6b;
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 16px;
    color: #ff6b6b;
    font-size: 0.85rem;
    display: none;
    white-space: pre-wrap;
    word-break: break-all;
  }

  #preview-section {
    display: none;
    width: 90%;
    max-width: 600px;
    margin-top: 20px;
  }

  #lottie-container {
    background: #0d0d1a;
    border-radius: 12px;
    border: 1px solid #333;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    position: relative;
  }
  #lottie-player {
    width: 100%;
    max-width: 400px;
    aspect-ratio: 1;
  }

  #bg-controls {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 4px;
  }
  .bg-swatch {
    width: 22px; height: 22px;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .bg-swatch:hover, .bg-swatch.active { border-color: #a0c4ff; }
  .bg-dark { background: #0d0d1a; }
  .bg-light { background: #f0f0f0; }
  .bg-white { background: #ffffff; }
  .bg-checker {
    background-image: linear-gradient(45deg, #ccc 25%, transparent 25%),
      linear-gradient(-45deg, #ccc 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #ccc 75%),
      linear-gradient(-45deg, transparent 75%, #ccc 75%);
    background-size: 10px 10px;
    background-position: 0 0, 0 5px, 5px -5px, -5px 0px;
  }

  #info-panel {
    margin-top: 12px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 0.8rem;
    color: #888;
  }
  #info-panel span { background: #2a2a4a; padding: 4px 10px; border-radius: 4px; }
  #info-panel .label { color: #666; }

  #controls {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    padding: 6px 16px;
    background: #2a2a4a;
    border: 1px solid #555;
    border-radius: 6px;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 0.85rem;
    user-select: none;
  }
  .ctrl-btn:hover { background: #3a3a5a; }
  .ctrl-btn.active { border-color: #a0c4ff; color: #a0c4ff; }

  .ctrl-check {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.85rem;
    color: #e0e0e0;
    cursor: pointer;
    user-select: none;
  }
  .ctrl-check input { accent-color: #a0c4ff; cursor: pointer; }

  #speed-slider, #progress-slider { accent-color: #a0c4ff; }
  #speed-slider { width: 100px; }
  #progress-slider { width: 200px; }
  .slider-label { font-size: 0.8rem; color: #888; }

  #json-section {
    margin-top: 16px;
    width: 100%;
  }
  #json-toggle {
    padding: 6px 16px;
    background: #2a2a4a;
    border: 1px solid #555;
    border-radius: 6px;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 0.85rem;
    width: 100%;
    text-align: left;
  }
  #json-toggle:hover { background: #3a3a5a; }
  #json-content {
    display: none;
    margin-top: 8px;
    max-height: 400px;
    overflow: auto;
    background: #0d0d1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.75rem;
    white-space: pre;
    color: #aaa;
  }

  #download-btn {
    margin-top: 12px;
    padding: 8px 20px;
    background: #1a4a2a;
    border: 1px solid #4a8;
    border-radius: 6px;
    color: #8f8;
    cursor: pointer;
    font-size: 0.85rem;
  }
  #download-btn:hover { background: #2a5a3a; }

  #wasm-hash {
    position: fixed;
    bottom: 6px;
    right: 10px;
    font-size: 0.65rem;
    color: #444;
    font-family: 'SF Mono', 'Fira Code', monospace;
    user-select: all;
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.2rem; }
    #controls { gap: 8px; }
    #progress-slider { width: 140px; }
  }
</style>
</head>
<body>

<h1>AVD &lt;&gt; Lottie Converter</h1>
<p class="subtitle">Drop an AVD XML or Lottie JSON file to convert and preview</p>

<div id="loading">
  <div class="spinner"></div>
  <div>Loading WASM module...</div>
</div>

<div id="app">
  <div id="drop-zone">
    <p>Drag & drop an AVD XML or Lottie JSON file here</p>
    <button class="browse" onclick="document.getElementById('file-input').click()">Browse Files</button>
    <input type="file" id="file-input" accept=".xml,.json">
  </div>

  <div id="error"></div>

  <div id="preview-section">
    <div id="lottie-container">
      <div id="lottie-player"></div>
      <div id="bg-controls">
        <div class="bg-swatch bg-dark active" data-bg="#0d0d1a" title="Dark"></div>
        <div class="bg-swatch bg-light" data-bg="#f0f0f0" title="Light"></div>
        <div class="bg-swatch bg-white" data-bg="#ffffff" title="White"></div>
        <div class="bg-swatch bg-checker" data-bg="checker" title="Checker"></div>
      </div>
    </div>

    <div id="info-panel"></div>

    <div id="controls">
      <button class="ctrl-btn" id="play-btn">Pause</button>
      <label class="ctrl-check"><input type="checkbox" id="loop-check" checked><span>Repeat</span></label>
      <label class="ctrl-check"><input type="checkbox" id="bounce-check"><span>Bounce</span></label>
      <label class="slider-label">Speed</label>
      <input type="range" id="speed-slider" min="0.25" max="2" step="0.25" value="1">
      <span class="slider-label" id="speed-val">1x</span>
      <input type="range" id="progress-slider" min="0" max="100" step="0.1" value="0">
    </div>

    <div id="json-section">
      <button id="json-toggle">Show Output</button>
      <div id="json-content"></div>
    </div>

    <button id="download-btn">Download</button>
  </div>
</div>

<div id="wasm-hash"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<script type="module">
import init, { convert_avd_to_lottie, convert_lottie_to_avd } from './pkg/avd_to_lottie.js';

let anim = null;
let lottieJson = null;
let convertedOutput = null;  // The converted output (JSON string or XML string)
let conversionMode = null;   // 'avd-to-lottie' or 'lottie-to-avd'
let isPlaying = true;
let isLooping = true;
let isBouncing = false;
let bounceDirection = 1;
let currentFileName = 'animation';

async function main() {
  try {
    await init();

    fetch(new URL('./pkg/avd_to_lottie_bg.wasm', import.meta.url))
      .then(r => r.arrayBuffer())
      .then(buf => crypto.subtle.digest('SHA-256', buf))
      .then(hash => {
        const hex = [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2, '0')).join('');
        document.getElementById('wasm-hash').textContent = 'wasm:' + hex.slice(0, 12);
      });
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '<div style="color:#ff6b6b">Failed to load WASM module: ' + e.message + '</div>';
    return;
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  setupDropZone();
  setupControls();
  setupBgControls();
}

function setupDropZone() {
  const zone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  document.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  });
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    e.stopPropagation();
    zone.classList.remove('hover');
    const dt = e.dataTransfer;
    if (dt.files && dt.files.length > 0) {
      handleFile(dt.files[0]);
      return;
    }
    if (dt.items && dt.items.length > 0) {
      for (let i = 0; i < dt.items.length; i++) {
        if (dt.items[i].kind === 'file') {
          const file = dt.items[i].getAsFile();
          if (file) { handleFile(file); return; }
        }
      }
    }
  });

  zone.addEventListener('dragenter', (e) => { e.preventDefault(); zone.classList.add('hover'); });
  zone.addEventListener('dragleave', (e) => {
    if (e.relatedTarget && zone.contains(e.relatedTarget)) return;
    zone.classList.remove('hover');
  });
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) handleFile(file);
  });
  zone.addEventListener('click', (e) => {
    if (e.target === zone || e.target.tagName === 'P') fileInput.click();
  });
}

function handleFile(file) {
  if (!(file instanceof Blob)) {
    console.error('handleFile: not a Blob', file);
    return;
  }
  currentFileName = (file.name || 'animation').replace(/\.(xml|json)$/i, '');
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    console.log('Read file:', file.name, 'length:', text.length, 'start:', text.slice(0, 60));
    convertAndPlay(text, file.name || 'file');
  };
  reader.onerror = (e) => {
    console.error('FileReader error:', e);
    document.getElementById('error').textContent = 'Error reading file: ' + reader.error;
    document.getElementById('error').style.display = 'block';
  };
  reader.readAsText(file);
}

function showPreview(lottieData, fileName) {
  const previewEl = document.getElementById('preview-section');
  const info = document.getElementById('info-panel');
  const frames = lottieData.op - lottieData.ip;
  const duration = (frames / lottieData.fr).toFixed(2);
  const direction = conversionMode === 'lottie-to-avd' ? 'Lottie \u2192 AVD' : 'AVD \u2192 Lottie';
  info.innerHTML =
    `<span><span class="label">File:</span> ${fileName}</span>` +
    `<span><span class="label">Mode:</span> ${direction}</span>` +
    `<span><span class="label">Size:</span> ${lottieData.w}\u00d7${lottieData.h}</span>` +
    `<span><span class="label">Duration:</span> ${duration}s</span>` +
    `<span><span class="label">Frames:</span> ${frames} @ ${lottieData.fr}fps</span>`;

  if (anim) { anim.destroy(); anim = null; }
  const container = document.getElementById('lottie-player');
  container.innerHTML = '';

  bounceDirection = 1;
  anim = lottie.loadAnimation({
    container,
    renderer: 'svg',
    loop: isLooping && !isBouncing,
    autoplay: true,
    animationData: lottieData,
  });
  isPlaying = true;
  document.getElementById('play-btn').textContent = 'Pause';

  anim.addEventListener('enterFrame', () => {
    const progress = (anim.currentFrame / (anim.totalFrames - 1)) * 100;
    document.getElementById('progress-slider').value = progress;
  });

  // Bounce mode: reverse direction at each end
  anim.addEventListener('complete', () => {
    if (!isBouncing) return;
    bounceDirection *= -1;
    anim.setDirection(bounceDirection);
    anim.play();
  });

  previewEl.style.display = 'block';

  const outputText = conversionMode === 'avd-to-lottie'
    ? JSON.stringify(lottieData, null, 2)
    : convertedOutput;
  document.getElementById('json-content').textContent = outputText;
}

function updateDownloadButton() {
  const btn = document.getElementById('download-btn');
  const toggle = document.getElementById('json-toggle');
  if (conversionMode === 'lottie-to-avd') {
    btn.textContent = 'Download AVD XML';
    toggle.textContent = 'Show AVD XML';
  } else {
    btn.textContent = 'Download Lottie JSON';
    toggle.textContent = 'Show Lottie JSON';
  }
  document.getElementById('json-content').style.display = 'none';
}

function convertAndPlay(text, fileName) {
  const errorEl = document.getElementById('error');
  const previewEl = document.getElementById('preview-section');
  errorEl.style.display = 'none';

  try {
    const trimmed = text.trimStart();

    if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
      // Lottie JSON -> AVD XML
      conversionMode = 'lottie-to-avd';
      lottieJson = JSON.parse(text);

      const avdXml = convert_lottie_to_avd(text);
      convertedOutput = avdXml;

      showPreview(lottieJson, fileName);
      updateDownloadButton();
    } else {
      // AVD XML -> Lottie JSON
      conversionMode = 'avd-to-lottie';
      const json = convert_avd_to_lottie(text);
      lottieJson = JSON.parse(json);
      convertedOutput = json;

      showPreview(lottieJson, fileName);
      updateDownloadButton();
    }
  } catch (err) {
    errorEl.textContent = 'Conversion error: ' + err;
    errorEl.style.display = 'block';
    previewEl.style.display = 'none';
  }
}

function setupControls() {
  document.getElementById('play-btn').addEventListener('click', () => {
    if (!anim) return;
    if (isPlaying) {
      anim.pause();
      document.getElementById('play-btn').textContent = 'Play';
    } else {
      anim.play();
      document.getElementById('play-btn').textContent = 'Pause';
    }
    isPlaying = !isPlaying;
  });

  document.getElementById('loop-check').addEventListener('change', (e) => {
    isLooping = e.target.checked;
    if (anim) {
      anim.loop = isLooping && !isBouncing;
    }
  });

  document.getElementById('bounce-check').addEventListener('change', (e) => {
    isBouncing = e.target.checked;
    if (anim) {
      // Bounce mode uses complete event to reverse; disable native loop
      anim.loop = isLooping && !isBouncing;
      if (!isBouncing) {
        // Reset direction when turning bounce off
        bounceDirection = 1;
        anim.setDirection(1);
      }
    }
  });

  document.getElementById('speed-slider').addEventListener('input', (e) => {
    const speed = parseFloat(e.target.value);
    document.getElementById('speed-val').textContent = speed + 'x';
    if (anim) anim.setSpeed(speed);
  });

  document.getElementById('progress-slider').addEventListener('input', (e) => {
    if (!anim) return;
    const frame = (parseFloat(e.target.value) / 100) * (anim.totalFrames - 1);
    anim.goToAndStop(frame, true);
    isPlaying = false;
    document.getElementById('play-btn').textContent = 'Play';
  });

  document.getElementById('json-toggle').addEventListener('click', () => {
    const content = document.getElementById('json-content');
    const btn = document.getElementById('json-toggle');
    if (content.style.display === 'none' || !content.style.display) {
      content.style.display = 'block';
      btn.textContent = conversionMode === 'lottie-to-avd' ? 'Hide AVD XML' : 'Hide Lottie JSON';
    } else {
      content.style.display = 'none';
      btn.textContent = conversionMode === 'lottie-to-avd' ? 'Show AVD XML' : 'Show Lottie JSON';
    }
  });

  document.getElementById('download-btn').addEventListener('click', () => {
    if (!convertedOutput) return;
    if (conversionMode === 'lottie-to-avd') {
      const blob = new Blob([convertedOutput], { type: 'application/xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = currentFileName + '.xml';
      a.click();
      URL.revokeObjectURL(url);
    } else {
      const blob = new Blob([JSON.stringify(lottieJson, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = currentFileName + '.json';
      a.click();
      URL.revokeObjectURL(url);
    }
  });
}

function setupBgControls() {
  const container = document.getElementById('lottie-container');
  document.querySelectorAll('.bg-swatch').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      const bg = el.dataset.bg;
      if (bg === 'checker') {
        container.style.background = '';
        container.style.backgroundImage = 'linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%)';
        container.style.backgroundSize = '20px 20px';
        container.style.backgroundPosition = '0 0, 0 10px, 10px -10px, -10px 0px';
      } else {
        container.style.backgroundImage = '';
        container.style.backgroundSize = '';
        container.style.backgroundPosition = '';
        container.style.background = bg;
      }
    });
  });
}

main();
</script>
</body>
</html>
